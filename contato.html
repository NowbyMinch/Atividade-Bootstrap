    <div class="container mt-3">
      <h3>Cadastro</h3>
      <form class="row g-3">

        <div class="col-md-6 col-sm-12">
          <div class="form-floating">
            <input
              type="text"
              name="nome"
              id="nome"
              class="form-control"
              placeholder="Nome completo"
              required
            />
            <label for="nome">Nome completo</label>
          </div>
        </div>

        <div class="col-md-3 col-sm-12">
          <div class="form-floating">
            <input
              type="number"
              name="valor" 
              id="valor"
              step="0.5"
              class="form-control"
              placeholder="Valor"
              required
            />
            <label for="valor">Valor</label>
          </div>
        </div>

        <div class="col-md-3 col-sm-12">
          <div class="form-floating">
            <input
              type="number"
              name="quantidade" 
              id="quantidade"
              class="form-control"
              placeholder="Quantidade"
              required
            />
            <label for="quantidade">Quantidade</label>
          </div>
        </div>

        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <select name="categoria" id="categoria" class="form-select" required>
              <option value="" selected disabled>Selecione</option>
              <option value="frontend">Cordofones (cordas)</option>
              <option value="backend">Aerofones (sopros)</option>
              <option value="frontend">Membranofones (membrana)</option>
              <option value="backend">Idiofones (corpo próprio)</option>
            </select>
            <label for="categoria">Categoria</label>
          </div>
        </div>
        
        <div class="col-md-4 col-sm-12"> 
          <label class="form-label d-block">Fabricado em</label>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="aluno" class="form-check-input">
            <label for="aluno" class="form-check-label">SP</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="aluno" class="form-check-input">
            <label for="aluno" class="form-check-label">RJ</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="professor" class="form-check-input">
            <label for="professor" class="form-check-label">MG</label>
          </div>
        </div>

          </div>

        <div class="col-12 mb-4">
          <button type="submit" class="btn btn-success">Enviar</button>
